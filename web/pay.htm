<!doctype html>
<html lang='en'>
<head>
	<meta charset='utf-8'>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<title>Everpublich pricing</title>
	<link rel='icon' href='favicon.svg' type='image/svg+xml'>
	<link rel='stylesheet' href='app.css'>
	<script async src='https://js.stripe.com/v3/pricing-table.js'></script>
</head>
<body>
	<header class='topbar'>
		<nav>
			<a href='index.html'>Home</a>
		</nav>
	</header>

	<main class='pricing'>
		<section class='admin-panel'>
			<p class='eyebrow'>Hidden MVP page</p>
			<h1>Future pricing</h1>
			<p>The pilot is free while the service is tested. If Everpublich reaches real demand, the expected paid plan is $5/month.</p>
			<div class='stripe-widget'>
				<stripe-pricing-table
					pricing-table-id='__STRIPE_PRICING_TABLE_ID__'
					publishable-key='__STRIPE_PUBLISHABLE_KEY__'
				></stripe-pricing-table>
			</div>
		</section>
	</main>
</body>
</html>
