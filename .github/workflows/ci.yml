name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZOLA_VERSION: v0.22.1

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt,llvm-tools-preview
      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/zola.tar.gz
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin zola
          zola --version
      - name: Build GitHub Pages artifact
        run: python scripts/build_pages.py
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate Rust coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --all-targets --workspace --lcov --output-path coverage/lcov.info
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

  pages:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Build GitHub Pages artifact
        env:
          EVERPUBLICH_PAGES_API_BASE_URL: ${{ vars.EVERPUBLICH_PAGES_API_BASE_URL }}
          EVERPUBLICH_PAGES_BASE_DOMAIN: ${{ vars.EVERPUBLICH_PAGES_BASE_DOMAIN }}
        run: python scripts/build_pages.py
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist/pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
