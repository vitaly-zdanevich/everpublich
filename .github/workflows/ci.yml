name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZOLA_VERSION: v0.22.1

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt,llvm-tools-preview
      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/zola.tar.gz
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin zola
          zola --version
      - name: Install Brotli
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Node toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install asset tooling
        run: npm ci
      - name: Lint CSS and JavaScript
        run: npm run lint:assets
      - name: Check minified assets
        run: npm run check:minified
      - name: Build GitHub Pages artifact
        run: python scripts/build_pages.py
      - name: Test Pages build scripts
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Build release binary
        run: cargo build --release --locked --bin everpublich-cli
      - name: Upload release binary
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v5
        with:
          name: everpublich-cli-x86_64-unknown-linux-gnu
          path: target/release/everpublich-cli
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items

  sonar:
    name: Sonar
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Skip when Sonar token is absent
        if: ${{ env.SONAR_TOKEN == '' }}
        run: echo "SONAR_TOKEN is not configured; skipping Sonar scan."
      - uses: actions/checkout@v6
        if: ${{ env.SONAR_TOKEN != '' }}
        with:
          fetch-depth: 0
      - name: Rust coverage toolchain
        if: ${{ env.SONAR_TOKEN != '' }}
        run: rustup toolchain install stable --profile minimal --component llvm-tools-preview
      - name: Install Zola
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/zola.tar.gz
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin zola
          zola --version
      - name: Install Brotli
        if: ${{ env.SONAR_TOKEN != '' }}
        run: sudo apt-get update && sudo apt-get install -y brotli
      - name: Install cargo-llvm-cov
        if: ${{ env.SONAR_TOKEN != '' }}
        run: cargo install cargo-llvm-cov --locked
      - name: Generate Rust coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --all-targets --workspace --lcov --output-path coverage/lcov.info
      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}

  pages:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - name: Node toolchain
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - name: Install asset tooling
        run: npm ci
      - name: Build GitHub Pages artifact
        env:
          EVERPUBLICH_PAGES_API_BASE_URL: ${{ vars.EVERPUBLICH_PAGES_API_BASE_URL }}
        run: python scripts/build_pages.py
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages-${{ github.run_attempt }}
          path: dist/pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}
