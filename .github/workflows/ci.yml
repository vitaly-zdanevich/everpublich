name: ci

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ZOLA_VERSION: v0.22.1

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - name: Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy,rustfmt,llvm-tools-preview
      - name: Install Zola
        run: |
          curl -fsSL "https://github.com/getzola/zola/releases/download/${ZOLA_VERSION}/zola-${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o /tmp/zola.tar.gz
          sudo tar -xzf /tmp/zola.tar.gz -C /usr/local/bin zola
          zola --version
      - name: Embed README
        run: python scripts/embed_readme.py README.md web/readme-embed.html
      - name: Format
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Generate Rust coverage
        run: |
          mkdir -p coverage
          cargo llvm-cov --locked --all-targets --workspace --lcov --output-path coverage/lcov.info
      - name: Rustdoc
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --document-private-items
